<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greenhouse Controller</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
  :root {
    --bg: #0f1512;
    --card: #172019;
    --border: #263229;
    --text: #e7efe9;
    --muted: #8ba394;
    --green: #4ade80;
    --red: #f87171;
    --amber: #fbbf24;
    --blue: #60a5fa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  h1 { font-size: 1.4rem; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  select, button, input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.9rem;
  }
  button { cursor: pointer; }
  button.primary { background: var(--green); color: #0f1512; font-weight: 600; border: none; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .card .label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .card .value { font-size: 1.8rem; font-weight: 700; margin-top: 6px; }
  .relays { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .relay {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
  .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
  canvas { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 20px; max-height: 260px; }
  .settings-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 12px 0; }
  .settings-grid label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .settings-grid input { width: 100%; }
  .row { display: flex; align-items: center; gap: 8px; }
  #authGate { max-width: 320px; margin: 80px auto; text-align: center; }
  #authGate input { width: 100%; margin-bottom: 10px; }
  .hidden { display: none; }
  .stale { color: var(--red); }
</style>
</head>
<body>

<div id="authGate">
  <h1>Greenhouse Login</h1>
  <p class="sub">Dashboard basic-auth credentials</p>
  <input id="authUser" placeholder="username">
  <input id="authPass" type="password" placeholder="password">
  <button class="primary" onclick="doLogin()">Connect</button>
  <p id="authError" class="sub stale"></p>
</div>

<div id="app" class="hidden">
  <h1>🌿 Greenhouse Controller</h1>
  <div class="sub" id="deviceMeta">—</div>

  <div class="toolbar">
    <select id="deviceSelect" onchange="switchDevice()"></select>
    <button onclick="refreshAll()">Refresh</button>
    <span class="sub" id="lastUpdated"></span>
  </div>

  <div class="grid">
    <div class="card"><div class="label">Temperature</div><div class="value" id="valTemp">–</div></div>
    <div class="card"><div class="label">Humidity</div><div class="value" id="valHum">–</div></div>
    <div class="card"><div class="label">VPD (kPa)</div><div class="value" id="valVpd">–</div></div>
  </div>

  <div class="relays">
    <div class="relay"><span class="dot" id="dotFan"></span> Fan</div>
    <div class="relay"><span class="dot" id="dotHeater"></span> Heater</div>
    <div class="relay"><span class="dot" id="dotHumidifier"></span> Humidifier</div>
    <div class="relay"><span class="dot" id="dotLights"></span> Lights</div>
  </div>

  <canvas id="tempChart" height="80"></canvas>
  <button onclick="resetChartZoom(charts.temp)" style="margin-bottom:16px;">Reset zoom (18h view)</button>

  <canvas id="humChart" height="80"></canvas>
  <button onclick="resetChartZoom(charts.hum)" style="margin-bottom:16px;">Reset zoom (18h view)</button>

  <canvas id="vpdChart" height="80"></canvas>
  <button onclick="resetChartZoom(charts.vpd)" style="margin-bottom:16px;">Reset zoom (18h view)</button>

  <div class="settings-card">
    <h3 style="margin-top:0;">Setpoints</h3>
    <div class="settings-grid">
      <div><label>Temp min (°C)</label><input id="s_temp_min" type="number" step="0.1"></div>
      <div><label>Temp max (°C)</label><input id="s_temp_max" type="number" step="0.1"></div>
      <div><label>Humidity min (%)</label><input id="s_humidity_min" type="number" step="0.1"></div>
      <div><label>Humidity max (%)</label><input id="s_humidity_max" type="number" step="0.1"></div>
      <div><label>VPD target (kPa)</label><input id="s_vpd_target" type="number" step="0.05"></div>
      <div><label>Lights ON hour (0-23, UTC)</label><input id="s_light_on_hour" type="number" min="0" max="23"></div>
      <div><label>Lights OFF hour (0-23, UTC)</label><input id="s_light_off_hour" type="number" min="0" max="23"></div>
    </div>
    <div class="row">
      <input type="checkbox" id="s_manual_override">
      <label for="s_manual_override">Manual override (ignore automation, use switches below)</label>
    </div>
    <div class="row" style="margin-top:10px; gap:16px;">
      <label class="row"><input type="checkbox" id="o_fan"> Fan</label>
      <label class="row"><input type="checkbox" id="o_heater"> Heater</label>
      <label class="row"><input type="checkbox" id="o_humidifier"> Humidifier</label>
      <label class="row"><input type="checkbox" id="o_lights"> Lights</label>
    </div>
    <button class="primary" style="margin-top:14px;" onclick="saveSettings()">Save Settings</button>
    <span id="saveStatus" class="sub"></span>
  </div>
</div>

<script>
let authHeader = null;
let currentDevice = null;
let charts = {};
let pollTimer = null;

function doLogin() {
  const u = document.getElementById('authUser').value;
  const p = document.getElementById('authPass').value;
  authHeader = 'Basic ' + btoa(u + ':' + p);
  fetch('/api/devices', { headers: { Authorization: authHeader } })
    .then(r => {
      if (!r.ok) throw new Error('bad credentials');
      return r.json();
    })
    .then(devices => {
      document.getElementById('authGate').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      populateDevices(devices);
    })
    .catch(() => {
      document.getElementById('authError').textContent = 'Login failed. Check credentials.';
    });
}

function populateDevices(devices) {
  const sel = document.getElementById('deviceSelect');
  sel.innerHTML = '';
  if (devices.length === 0) {
    sel.innerHTML = '<option>No devices yet — register one via POST /api/devices</option>';
    return;
  }
  devices.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = `${d.name} (${d.id})`;
    sel.appendChild(opt);
  });
  currentDevice = devices[0].id;
  initCharts();
  refreshAll();
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(refreshAll, 5000);
}

function switchDevice() {
  currentDevice = document.getElementById('deviceSelect').value;
  refreshAll();
}

function authFetch(url, opts = {}) {
  opts.headers = Object.assign({}, opts.headers, { Authorization: authHeader });
  return fetch(url, opts);
}

const WINDOW_HOURS = 18;      // default visible window
const LOAD_HOURS = 72;        // how much history is loaded so panning has data to reveal

function resetChartZoom(chart) {
  chart.resetZoom();
  chart.options.scales.y.min = undefined;
  chart.options.scales.y.max = undefined;
  chart.update('none');
}

function rescaleYToVisibleRange(chart) {
  const xScale = chart.scales.x;
  const [xMin, xMax] = [xScale.min, xScale.max];
  const points = chart.data.datasets[0].data.filter(p => {
    const t = p.x instanceof Date ? p.x.getTime() : p.x;
    return t >= xMin && t <= xMax;
  });
  if (points.length === 0) return;
  const values = points.map(p => p.y);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const padding = (max - min) * 0.1 || 1; // 10% padding, or 1 unit if flat
  chart.options.scales.y.min = min - padding;
  chart.options.scales.y.max = max + padding;
  chart.update('none');
}

function buildScaleOpts() {
  const now = new Date();
  const windowStart = new Date(now.getTime() - WINDOW_HOURS * 3600 * 1000);
  const loadStart = new Date(now.getTime() - LOAD_HOURS * 3600 * 1000);

  return {
    responsive: true,
    animation: false,
    parsing: false, // data already in {x, y} form
    scales: {
      x: {
        type: 'time',
        time: { minUnit: 'second' }, // let Chart.js pick appropriate granularity as you zoom in
        min: windowStart,
        max: now,
        ticks: { color: '#8ba394' }
      },
      y: { ticks: { color: '#8ba394' } }
    },
    plugins: {
      legend: { labels: { color: '#e7efe9' } },
      zoom: {
        limits: { x: { min: loadStart.getTime(), max: now.getTime() } },
        zoom: {
          wheel: { enabled: true },
          pinch: { enabled: true },
          mode: 'x',
          onZoomComplete: ({ chart }) => rescaleYToVisibleRange(chart)
        },
        pan: {
          enabled: true,
          mode: 'x',
          onPanComplete: ({ chart }) => rescaleYToVisibleRange(chart)
        }
      }
    }
  };
}

function initCharts() {
  const ctxTemp = document.getElementById('tempChart').getContext('2d');
  const ctxHum = document.getElementById('humChart').getContext('2d');
  const ctxVpd = document.getElementById('vpdChart').getContext('2d');
  charts.temp = new Chart(ctxTemp, { type: 'line', data: { datasets: [{ label: 'Temperature (°C)', data: [], borderColor: '#f87171', tension: 0.3 }] }, options: buildScaleOpts() });
  charts.hum = new Chart(ctxHum, { type: 'line', data: { datasets: [{ label: 'Humidity (%)', data: [], borderColor: '#60a5fa', tension: 0.3 }] }, options: buildScaleOpts() });
  charts.vpd = new Chart(ctxVpd, { type: 'line', data: { datasets: [{ label: 'VPD (kPa)', data: [], borderColor: '#4ade80', tension: 0.3 }] }, options: buildScaleOpts() });
}

function refreshAll() {
  if (!currentDevice) return;
  document.getElementById('deviceMeta').textContent = `Device: ${currentDevice}`;

  authFetch(`/api/status/${currentDevice}`).then(r => r.json()).then(data => {
    if (!data.reading) {
      document.getElementById('valTemp').textContent = 'no data';
      return;
    }
    document.getElementById('valTemp').textContent = data.reading.temperature.toFixed(1) + ' °C';
    document.getElementById('valHum').textContent = data.reading.humidity.toFixed(1) + ' %';
    document.getElementById('valVpd').textContent = data.reading.vpd.toFixed(2);
    document.getElementById('lastUpdated').textContent = 'Last reading: ' + new Date(data.reading.ts).toLocaleTimeString();

    const c = data.control;
    setDot('dotFan', c.fan);
    setDot('dotHeater', c.heater);
    setDot('dotHumidifier', c.humidifier);
    setDot('dotLights', c.lights);
  });

  authFetch(`/api/readings/${currentDevice}?hours=${LOAD_HOURS}`).then(r => r.json()).then(rows => {
    charts.temp.data.datasets[0].data = rows.map(r => ({ x: new Date(r.ts), y: r.temperature }));
    charts.temp.update('none');
    charts.hum.data.datasets[0].data = rows.map(r => ({ x: new Date(r.ts), y: r.humidity }));
    charts.hum.update('none');
    charts.vpd.data.datasets[0].data = rows.map(r => ({ x: new Date(r.ts), y: r.vpd }));
    charts.vpd.update('none');
  });

  authFetch(`/api/settings/${currentDevice}`).then(r => r.json()).then(s => {
    document.getElementById('s_temp_min').value = s.temp_min;
    document.getElementById('s_temp_max').value = s.temp_max;
    document.getElementById('s_humidity_min').value = s.humidity_min;
    document.getElementById('s_humidity_max').value = s.humidity_max;
    document.getElementById('s_vpd_target').value = s.vpd_target;
    document.getElementById('s_light_on_hour').value = s.light_on_hour;
    document.getElementById('s_light_off_hour').value = s.light_off_hour;
    document.getElementById('s_manual_override').checked = !!s.manual_override;
    document.getElementById('o_fan').checked = !!s.override_fan;
    document.getElementById('o_heater').checked = !!s.override_heater;
    document.getElementById('o_humidifier').checked = !!s.override_humidifier;
    document.getElementById('o_lights').checked = !!s.override_lights;
  });
}

function setDot(id, on) {
  const el = document.getElementById(id);
  el.classList.toggle('on', !!on);
}

function saveSettings() {
  const payload = {
    temp_min: parseFloat(document.getElementById('s_temp_min').value),
    temp_max: parseFloat(document.getElementById('s_temp_max').value),
    humidity_min: parseFloat(document.getElementById('s_humidity_min').value),
    humidity_max: parseFloat(document.getElementById('s_humidity_max').value),
    vpd_target: parseFloat(document.getElementById('s_vpd_target').value),
    light_on_hour: parseInt(document.getElementById('s_light_on_hour').value),
    light_off_hour: parseInt(document.getElementById('s_light_off_hour').value),
    manual_override: document.getElementById('s_manual_override').checked,
    override_fan: document.getElementById('o_fan').checked,
    override_heater: document.getElementById('o_heater').checked,
    override_humidifier: document.getElementById('o_humidifier').checked,
    override_lights: document.getElementById('o_lights').checked
  };
  authFetch(`/api/settings/${currentDevice}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(r => r.json()).then(() => {
    document.getElementById('saveStatus').textContent = 'Saved ✓';
    setTimeout(() => document.getElementById('saveStatus').textContent = '', 2000);
  });
}
</script>
</body>
</html>
